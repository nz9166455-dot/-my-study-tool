<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>常识判断 · 记忆曲线背诵</title>
<style>
:root{
  --paper:#EEF6F1;
  --paper-card:#FFFFFF;
  --ink:#2B3D37;
  --ink-soft:#6C8079;
  --seal:#3E9C82;
  --seal-dark:#2E7A65;
  --gold:#DDA24E;
  --grid:#D7E9DE;
  --grid-soft:#E8F3ED;
  --green:#4B8B6F;
  --line:#D2E6DA;
  --border:#B9D9C6;
  --coral:#E0876A;
  --shadow: 0 1px 0 rgba(43,61,55,0.05);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  background-image:
    linear-gradient(var(--grid-soft) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-soft) 1px, transparent 1px);
  background-size: 28px 28px;
  color:var(--ink);
  font-family: "Songti SC","STSong","SimSun","PingFang SC","Microsoft YaHei",serif;
  min-height:100vh;
}
.app{max-width:880px;margin:0 auto;padding:20px 16px 60px;}

/* header — fresh card header block */
.header{
  border:1.5px solid var(--border);
  background:var(--paper-card);
  padding:18px 20px;
  position:relative;
  margin-bottom:18px;
  box-shadow: var(--shadow);
  border-radius:14px;
}
.header::before{
  content:"";
  position:absolute; inset:5px;
  border:1px solid var(--line);
  pointer-events:none;
  border-radius:10px;
}
.header-row{display:flex; align-items:flex-start; justify-content:space-between; gap:12px;}
.header h1{
  font-size:22px; margin:0 0 4px; letter-spacing:2px; font-weight:700;
}
.header .sub{font-size:12.5px; color:var(--ink-soft); letter-spacing:1px;}
.stamp{
  width:64px;height:64px;border-radius:50%;
  border:2.5px solid var(--seal);
  color:var(--seal);
  display:flex;align-items:center;justify-content:center;
  font-size:12px; font-weight:700; letter-spacing:1px; text-align:center;
  transform:rotate(-11deg);
  flex-shrink:0;
  font-family:"KaiTi","STKaiti",serif;
  line-height:1.15;
  opacity:0.88;
}

/* deck switcher */
.deck-switch{display:flex; gap:8px; margin-bottom:14px;}
.deck-pill{
  flex:1; text-align:center; padding:10px 8px; border:1.5px solid var(--border);
  cursor:pointer; font-size:13.5px; letter-spacing:1px; background:var(--paper-card);
  color:var(--ink-soft); border-radius:10px;
}
.deck-pill.active{background:var(--seal); border-color:var(--seal); color:#fff; font-weight:700;}
.deck-pill .n{display:block; font-size:10.5px; margin-top:2px; opacity:0.75;}

.flash .example{font-size:13px; color:var(--ink-soft); margin-top:14px; line-height:1.8; border-top:1px dashed var(--line); padding-top:12px; text-align:left;}
.flash .example .exlbl{color:var(--seal); font-size:11px; letter-spacing:1px; margin-right:4px;}
.browse-item .ex{font-size:11.5px; color:var(--ink-soft); flex-basis:100%; margin-top:2px; font-style:normal;}
.browse-item{flex-wrap:wrap;}

.tabs{display:flex; gap:0; margin-bottom:18px; border-bottom:1.5px solid var(--border);}
.tab{
  flex:1; text-align:center; padding:10px 6px; cursor:pointer;
  font-size:14px; letter-spacing:1px; color:var(--ink-soft);
  border:1px solid transparent; border-bottom:none;
  user-select:none;
}
.tab.active{
  color:var(--seal-dark); font-weight:700; background:var(--paper-card);
  border-color:var(--border); border-bottom:2px solid var(--paper-card);
  margin-bottom:-2px;
}
.tab:hover:not(.active){color:var(--ink);}

.panel{display:none;}
.panel.active{display:block;}

/* streak / check-in */
.streak-card{
  background:var(--paper-card); border:1px solid var(--line); border-radius:14px;
  padding:16px; margin-bottom:16px;
}
.streak-top{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
.streak-flame{font-size:30px; line-height:1; width:32px; height:32px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.streak-flame svg{width:30px; height:30px; display:block;}
.streak-main{font-size:16px; font-weight:700; color:var(--seal-dark);}
.streak-sub{font-size:12px; color:var(--ink-soft); margin-top:2px;}
.streak-week{display:flex; justify-content:space-between; gap:4px;}
.streak-day{display:flex; flex-direction:column; align-items:center; gap:4px; flex:1;}
.streak-dot{
  width:26px; height:26px; border-radius:50%; border:1.5px solid var(--line);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; color:#fff; background:var(--grid-soft);
}
.streak-dot.checked{background:var(--seal); border-color:var(--seal);}
.streak-dot.today{box-shadow:0 0 0 2px var(--gold);}
.streak-wd{font-size:10px; color:var(--ink-soft);}
.streak-toggle{font-size:11px; color:var(--seal); cursor:pointer; letter-spacing:0.5px; padding:4px 9px; border:1px solid var(--seal); border-radius:20px; white-space:nowrap; flex-shrink:0;}
.streak-toggle:hover{background:var(--seal); color:#fff;}
.heatmap-scroll{overflow-x:auto; padding-bottom:2px; -webkit-overflow-scrolling:touch;}
.heatmap-inner{display:inline-block; min-width:100%;}
.heatmap-months{position:relative; height:14px; margin-bottom:3px;}
.heatmap-months span{position:absolute; top:0; font-size:10px; color:var(--ink-soft);}
.heatmap-grid{display:grid; grid-auto-flow:column; grid-template-rows:repeat(7,11px); gap:3px;}
.heatmap-cell{width:11px; height:11px; border-radius:3px; background:var(--grid-soft); border:1px solid var(--line);}
.heatmap-cell.checked{background:var(--seal); border-color:var(--seal);}
.heatmap-cell.today{box-shadow:0 0 0 1px var(--gold);}
.heatmap-cell.future{opacity:0.5; border-style:dashed;}
.heatmap-legend{display:flex; align-items:center; justify-content:space-between; font-size:11px; color:var(--ink-soft); margin-top:8px;}

/* dashboard cards */
.grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px;}
.stat-box{
  background:var(--paper-card); border:1px solid var(--line); padding:14px 10px;
  text-align:center; border-radius:12px;
}
.stat-box .num{font-size:26px; font-weight:700; font-family:Georgia,serif;}
.stat-box .lbl{font-size:11.5px; color:var(--ink-soft); margin-top:2px; letter-spacing:0.5px;}
.stat-box.due .num{color:var(--seal);}
.stat-box.mastered .num{color:var(--gold);}
.stat-box.new .num{color:var(--green);}

.section-title{
  font-size:13px; letter-spacing:2px; color:var(--ink-soft);
  margin:22px 0 10px; display:flex; align-items:center; gap:8px;
}
.section-title::after{content:""; flex:1; height:1px; background:var(--line);}

.card-block{background:var(--paper-card); border:1px solid var(--line); padding:16px; margin-bottom:12px; border-radius:12px;}

.btn{
  display:inline-block; padding:11px 18px; border:1.5px solid var(--seal);
  background:var(--seal); color:#fff; font-size:14.5px; border-radius:8px;
  letter-spacing:1px; cursor:pointer; text-align:center; font-family:inherit;
  transition:opacity .15s;
}
.btn:hover{opacity:0.85;}
.btn.outline{background:transparent; color:var(--ink);}
.btn.block{display:block; width:100%;}
.btn:disabled{opacity:0.35; cursor:not-allowed;}

.chapter-list{display:flex; flex-direction:column; gap:8px;}
.chapter-row{
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 12px; background:var(--paper-card); border:1px solid var(--line);
  font-size:14px; cursor:pointer; border-radius:10px;
}
.chapter-row .cname{display:flex; align-items:center; gap:10px;}
.chapter-row .cbox{
  width:16px;height:16px;border:1.5px solid var(--border); flex-shrink:0; border-radius:4px;
  display:flex; align-items:center; justify-content:center; font-size:11px;
}
.chapter-row .cbox.checked{background:var(--ink); color:var(--paper-card);}
.chapter-row .cmeta{font-size:12px; color:var(--ink-soft);}

.setting-row{display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px dashed var(--line); font-size:14px;}
.stepper{display:flex; align-items:center; gap:10px;}
.stepper button{width:28px;height:28px;border:1.5px solid var(--border); background:var(--paper-card); font-size:15px; cursor:pointer; border-radius:6px; color:var(--seal-dark);}
.stepper span{min-width:24px; text-align:center; font-weight:700;}

/* review screen */
.review-wrap{display:flex; flex-direction:column; align-items:center; padding:10px 0 0;}
.progress-bar{width:100%; height:6px; background:var(--grid-soft); margin-bottom:20px; position:relative; overflow:hidden;}
.progress-bar .fill{height:100%; background:var(--seal);}
.flash{
  width:100%; min-height:260px; background:var(--paper-card); border:1.5px solid var(--border); border-radius:16px;
  position:relative; padding:26px 22px; display:flex; flex-direction:column;
  justify-content:center; align-items:center; text-align:center; cursor:pointer;
}
.flash::before{content:""; position:absolute; inset:6px; border:1px solid var(--line); pointer-events:none; border-radius:11px;}
.flash .tag{position:absolute; top:14px; left:16px; font-size:11px; color:var(--ink-soft); letter-spacing:1px;}
.flash .boxtag{position:absolute; top:14px; right:16px; font-size:11px; color:var(--gold); letter-spacing:1px;}
.flash .term{font-size:26px; font-weight:700; letter-spacing:1px; line-height:1.5;}
.flash .hint{margin-top:16px; font-size:12px; color:var(--ink-soft); letter-spacing:1px;}
.flash .def{font-size:16.5px; line-height:1.9; color:var(--ink); margin-top:6px;}
.flash .divider{width:40px; height:2px; background:var(--seal); margin:14px 0;}

.rate-row{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:100%; margin-top:16px;}
.rate-btn{
  padding:13px 4px; border:1.5px solid var(--border); cursor:pointer; text-align:center;
  background:var(--paper-card); font-size:14px; letter-spacing:1px; border-radius:10px;
}
.rate-btn .k{display:block; font-size:11px; color:var(--ink-soft); margin-top:2px;}
.rate-btn.forgot{border-color:var(--coral); color:var(--coral);}
.rate-btn.forgot:hover{background:var(--coral); color:#fff;}
.rate-btn.fuzzy{border-color:var(--ink-soft);}
.rate-btn.fuzzy:hover{background:var(--ink-soft); color:#fff;}
.rate-btn.good{border-color:var(--green); color:var(--green);}
.rate-btn.good:hover{background:var(--green); color:#fff;}

.empty-state{text-align:center; padding:50px 20px; color:var(--ink-soft);}
.empty-state .big{font-size:40px; margin-bottom:10px;}

/* browse */
.search-box{width:100%; padding:10px 12px; border:1.5px solid var(--border); background:var(--paper-card); font-size:14px; margin-bottom:14px; font-family:inherit; border-radius:10px;}
.browse-group{margin-bottom:18px;}
.browse-group h3{font-size:13px; letter-spacing:1px; color:var(--seal); margin:0 0 8px; padding-bottom:4px; border-bottom:1px solid var(--line);}
.browse-item{
  display:flex; justify-content:space-between; gap:10px; padding:9px 4px; border-bottom:1px dashed var(--grid-soft); font-size:13.5px;
}
.browse-item .t{font-weight:700; min-width:110px; flex-shrink:0;}
.browse-item .d{color:var(--ink-soft); flex:1;}
.browse-item .m{font-size:10px; color:var(--gold); flex-shrink:0;}

/* stats bars */
.bar-row{margin-bottom:12px;}
.bar-row .lbl-row{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:4px;}
.bar-track{height:14px; background:var(--grid-soft); position:relative; border:1px solid var(--line);}
.bar-fill{height:100%; background:var(--green);}

.footer-note{text-align:center; font-size:11px; color:var(--ink-soft); margin-top:30px; letter-spacing:1px;}

@media (max-width:480px){
  .header h1{font-size:18px;}
  .flash .term{font-size:21px;}
  .flash .def{font-size:15px;}
  .stamp{width:52px;height:52px; font-size:10px;}
}
</style>

function currentStreak(){

  if(!checkins[d]) d = addDays(d, -1);

  }
  return streak;
}

function last7Days(){
  var days = [];
  for(var i = 6; i >= 0; i--){
    var d = addDays(todayStr(), -i);
    days.push({date: d, checked: !!checkins[d], isToday: i===0});
  }
  return days;
}

// build a GitHub-style grid for the coming year: array of weeks, each week = 7 days (Sun-Sat)
// starts at the Sunday of the current week and runs ~53 weeks into the future
function buildYearGrid(){
  var today = todayStr();
  var todayDow = new Date(today + 'T00:00:00').getDay();
  var start = addDays(today, -todayDow); // back up to the preceding Sunday
  var weeks = [];
  var cur = start;
  var guard = 0;
  while(guard < 53){
    var week = [];
    for(var i = 0; i < 7; i++){
      week.push({
        date: cur,
        checked: !!checkins[cur],
        isToday: cur === today,
        future: cur > today
      });
      cur = addDays(cur, 1);
    }
    weeks.push(week);
    guard++;
  }
  return weeks;
}

// ---------- pixel-art four-leaf clover (replaces the seedling emoji) ----------
var CLOVER_PATTERN = [
  '..XXXXXX..',
  '.XXXXXXXX.',
  'XXXXXXXXXX',
  'XXXXXXXXXX',
  'XXXXXXXXXX',
  'XXXXXXXXXX',
  'XXXXXXXXXX',
  'XXXXXXXXXX',
  '.XXXXXXXX.',
  '..XXXXXX..',
  '....SS....',
  '....SS....',
  '....SS....'
];

function buildCloverSVG(){
  var rows = CLOVER_PATTERN;
  var cols = rows[0].length;
  var mainRects = '';
  var stemRects = '';
  for(var r = 0; r < rows.length; r++){
    for(var c = 0; c < cols; c++){
      var ch = rows[r][c];
      if(ch === 'X'){
        mainRects += '<rect x="' + c + '" y="' + r + '" width="1" height="1"/>';
      } else if(ch === 'S'){
        stemRects += '<rect x="' + c + '" y="' + r + '" width="1" height="1"/>';
      }
    }
  }
  // subtle darker seam through the center so the four lobes read distinctly
  var seam = '<rect x="4" y="4" width="1" height="1"/><rect x="5" y="4" width="1" height="1"/>' +
    '<rect x="4" y="5" width="1" height="1"/><rect x="5" y="5" width="1" height="1"/>' +
    '<rect x="4" y="3" width="1" height="1"/><rect x="5" y="3" width="1" height="1"/>' +
    '<rect x="4" y="6" width="1" height="1"/><rect x="5" y="6" width="1" height="1"/>';
  // light highlight pixels, upper-left, for a little 8-bit shine
  var shine = '<rect x="2" y="2" width="1" height="1"/><rect x="3" y="1" width="1" height="1"/>';
  return '<svg viewBox="0 0 ' + cols + ' ' + rows.length + '" shape-rendering="crispEdges">' +
    '<g fill="var(--green)">' + mainRects + '</g>' +
    '<g fill="var(--seal-dark)" opacity="0.5">' + seam + '</g>' +
    '<g fill="#fff" opacity="0.35">' + shine + '</g>' +
    '<g fill="#8B6B3D">' + stemRects + '</g>' +
    '</svg>';
}

function buildIndex(cards){
  var chMap = {};
  var order = [];
  cards.forEach(function(c){
    if(!chMap[c.chapter]){ chMap[c.chapter] = {chapter:c.chapter, count:0, sections:{}, sectionOrder:[]}; order.push(c.chapter); }
    var ch = chMap[c.chapter];
    ch.count++;
    if(!ch.sections[c.section]){ ch.sections[c.section] = {section:c.section, count:0}; ch.sectionOrder.push(c.section); }
    ch.sections[c.section].count++;
  });
  return order.map(function(k){
    var ch = chMap[k];
    return {chapter:ch.chapter, count:ch.count, sections: ch.sectionOrder.map(function(s){return ch.sections[s];})};
  });
}

function addDays(dateStr, n){
  var d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// ---------- storage layer (plain localStorage — works in any browser, no Claude dependency) ----------
var LocalStore = {
  // detect once: does the Claude artifact environment's window.storage exist and actually work?
  nativeChecked: false,
  useNative: false,

  async ensureChecked(){
    if(this.nativeChecked) return;
    this.nativeChecked = true;
    if(typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function'){
      try{
        await window.storage.set('__srs_probe__', '1', false);
        this.useNative = true;
      } catch(e){
        this.useNative = false;
      }
    }
  },

  async get(key){
    await this.ensureChecked();
    if(this.useNative){
      try{ return await window.storage.get(key, false); }
      catch(e){ /* fall through to localStorage below */ }
    }
    try{
      var v = localStorage.getItem(key);
      return v === null ? null : {key: key, value: v};
    } catch(e){ return null; }
  },

  async set(key, value){
    await this.ensureChecked();
    if(this.useNative){
      try{ return await window.storage.set(key, value, false); }
      catch(e){ /* fall through to localStorage below */ }
    }
    try{
      localStorage.setItem(key, value);
      return {key: key, value: value};
    } catch(e){ console.error('storage set failed', e); return null; }
  }
};

var firebaseConfig = {

};

function sanitizeSyncCode(code){
  var s = String(code || '').trim().replace(/[^a-zA-Z0-9\u4e00-\u9fa5_-]/g, '_');
  if(!s) s = 'default';
  return 'sync_' + s;
}

var Sync = {
  code: '',
  docId: '',
  db: null,
  unsub: null,
  status: 'off', // off | connecting | synced | error
  applyingRemote: false,
  lastPushedAt: 0,
  pushTimer: null,

  ensureFirebase(){
    if(this.db) return true;
    try{
      if(typeof firebase === 'undefined') return false;
      if(!firebase.apps || !firebase.apps.length){ firebase.initializeApp(firebaseConfig); }
      this.db = firebase.firestore();
      return true;
    } catch(e){ console.error('firebase init error', e); return false; }
  },

  async init(){
    try{
      var res = await LocalStore.get('srs_sync_code');
      if(res && res.value){
        await this.connect(res.value, false);
      }
    } catch(e){}
  },

  async gatherLocalPayload(){
    var decksData = {};
    for(var i = 0; i < DECKS.length; i++){
      var id = DECKS[i].id;
      var raw = null;
      if(id === activeDeckId){
        raw = JSON.stringify(state);
      } else {
        try{
          var r = await LocalStore.get('srs_state_' + id);
          raw = r && r.value ? r.value : null;
        } catch(e){ raw = null; }
      }
      if(raw){
        try{ decksData[id] = JSON.parse(raw); } catch(e){}
      }
    }
    return { decks: decksData, checkins: checkins, updatedAt: Date.now() };
  },

  async applyRemotePayload(payload){
    this.applyingRemote = true;
    try{
      if(payload.checkins){
        checkins = payload.checkins;
        try{ await LocalStore.set('srs_checkins', JSON.stringify(checkins)); }catch(e){}
      }
      if(payload.decks){
        for(var id in payload.decks){
          if(!payload.decks.hasOwnProperty(id)) continue;
          try{ await LocalStore.set('srs_state_' + id, JSON.stringify(payload.decks[id])); }catch(e){}
          if(id === activeDeckId){
            var parsed = payload.decks[id];
            state.progress = parsed.progress || {};
            state.settings = parsed.settings || state.settings;
            if(!state.settings.chapters || Object.keys(state.settings.chapters).length===0) state.settings.chapters = defaultChapterSelection();
            state.daily = parsed.daily || state.daily;
            if(state.daily.date !== todayStr()) state.daily = {date: todayStr(), introduced:0};
          }
        }
      }
      session = null;
      render();
    } finally {
      this.applyingRemote = false;
    }
  },

  async connect(code, isUserAction){
    code = (code || '').trim();
    if(!code) return;
    if(!this.ensureFirebase()){
      this.status = 'error';
      if(isUserAction) alert('云同步初始化失败，请检查网络连接后重试');
      render();
      return;
    }
    this.status = 'connecting';
    render();
    try{
      await firebase.auth().signInAnonymously();
      this.code = code;
      this.docId = sanitizeSyncCode(code);
      try{ await LocalStore.set('srs_sync_code', code); }catch(e){}

      var docRef = this.db.collection('syncs').doc(this.docId);
      var snap = await docRef.get();

      if(isUserAction){
        var localPayload = await this.gatherLocalPayload();
        if(snap.exists){
          var useCloud = confirm('检测到云端已有这个同步码的数据。\n点击"确定"用云端数据覆盖本机；点击"取消"用本机数据覆盖云端。');
          if(useCloud){
            await this.applyRemotePayload(snap.data());
          } else {
            this.lastPushedAt = localPayload.updatedAt;
            await docRef.set(localPayload);
          }
        } else {
          this.lastPushedAt = localPayload.updatedAt;
          await docRef.set(localPayload);
        }
      } else if(snap.exists){
        await this.applyRemotePayload(snap.data());
      }

      this.startListening();
      this.status = 'synced';
      render();
    } catch(e){
      console.error('sync connect failed', e);
      this.status = 'error';
      if(isUserAction) alert('连接同步失败：' + (e && e.message ? e.message : '未知错误'));
      render();
    }
  },

  startListening(){
    if(this.unsub){ this.unsub(); this.unsub = null; }
    if(!this.db || !this.docId) return;
    var self = this;
    this.unsub = this.db.collection('syncs').doc(this.docId).onSnapshot(function(snap){
      if(!snap.exists) return;
      var data = snap.data();
      if(!data || !data.updatedAt) return;
      if(data.updatedAt <= self.lastPushedAt) return; // this is our own write echoing back
      self.applyRemotePayload(data);
    }, function(err){
      console.error('sync listen error', err);
      self.status = 'error';
      render();
    });
  },

  push(){
    if(this.status !== 'synced' || this.applyingRemote) return;
    clearTimeout(this.pushTimer);
    var self = this;
    this.pushTimer = setTimeout(async function(){
      if(!self.db || !self.docId) return;
      try{
        var payload = await self.gatherLocalPayload();
        self.lastPushedAt = payload.updatedAt;
        await self.db.collection('syncs').doc(self.docId).set(payload);
      } catch(e){ console.error('sync push failed', e); }
    }, 600);
  },

  async disconnect(){
    if(this.unsub){ this.unsub(); this.unsub = null; }
    this.code = '';
    this.docId = '';
    this.status = 'off';
    try{ await LocalStore.set('srs_sync_code', ''); }catch(e){}
    render();
  }
};

async function loadState(){
  var storeKey = 'srs_state_' + activeDeckId;
  try{
    var res = await LocalStore.get(storeKey);
    if(res && res.value){
      var parsed = JSON.parse(res.value);
      state.progress = parsed.progress || {};
      state.settings = parsed.settings || {newPerDay:20, chapters: defaultChapterSelection()};
      if(!state.settings.chapters || Object.keys(state.settings.chapters).length===0) state.settings.chapters = defaultChapterSelection();
      state.daily = parsed.daily || {date:'', introduced:0};
    } else {
      state = {progress:{}, settings:{newPerDay:20, chapters: defaultChapterSelection()}, daily:{date:'', introduced:0}};
    }
  } catch(e){
    state = {progress:{}, settings:{newPerDay:20, chapters: defaultChapterSelection()}, daily:{date:'', introduced:0}};
  }
  if(state.daily.date !== todayStr()){
    state.daily = {date: todayStr(), introduced:0};
  }
  stateLoaded = true;
}

var saveTimer = null;
function saveState(){
  var storeKey = 'srs_state_' + activeDeckId;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async function(){
    try{
      await LocalStore.set(storeKey, JSON.stringify(state));
      Sync.push();
    } catch(e){ console.error('save failed', e); }
  }, 150);
}

async function switchDeck(id){
  if(id === activeDeckId && stateLoaded) return;
  activeDeckId = id;
  var deck = currentDeck();
  CARDS = deck.cards;
  deckHasExample = deck.hasExample;
  CHAPTERS = buildIndex(CARDS);
  state = {progress:{}, settings:{newPerDay:20, chapters:{}}, daily:{date:'', introduced:0}};
  stateLoaded = false;
  session = null;
  window.__browseQuery = '';
  render();
  try{ await LocalStore.set('srs_active_deck', activeDeckId); }catch(e){}
  await loadState();
  render();
}

// ---------- selection / queue helpers ----------
function isSelected(card){
  return state.settings.chapters[card.chapter] !== false;
}
function cardProg(id){ return state.progress[id]; }
function isMastered(id){
  var p = cardProg(id);
  return !!p && p.box >= MASTER_BOX;
}
function isNew(id){ return !cardProg(id); }
function isDue(id){
  var p = cardProg(id);
  return !!p && p.due <= todayStr();
}

function dueReviewCards(){
  return CARDS.filter(function(c){ return isSelected(c) && isDue(c.id); });
}
function newAvailableCards(){
  return CARDS.filter(function(c){ return isSelected(c) && isNew(c.id); });
}
function masteredCount(){
  return CARDS.filter(function(c){ return isSelected(c) && isMastered(c.id); }).length;
}
function selectedTotal(){
  return CARDS.filter(isSelected).length;
}

function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}

function buildQueue(){
  var due = shuffle(dueReviewCards());
  var newAllowed = Math.max(0, state.settings.newPerDay - state.daily.introduced);
  var fresh = newAvailableCards().slice(0, newAllowed);
  return due.concat(fresh);
}

// ---------- rating logic ----------
function rateCard(id, rating){
  var today = todayStr();
  var p = state.progress[id];
  var wasNew = !p;
  if(!p){
    p = {box:-1, due: today, reps:0};
  }
  if(rating === 'forgot'){
    p.box = 0;
    p.due = today;
  } else if(rating === 'fuzzy'){
    p.box = Math.max(0, p.box);
    var half = Math.max(1, Math.ceil(STAGES[p.box]/2));
    p.due = addDays(today, half);
  } else if(rating === 'good'){
    p.box = Math.min(p.box+1, STAGES.length-1);
    p.due = addDays(today, STAGES[p.box]);
  }
  p.reps = (p.reps||0)+1;
  state.progress[id] = p;
  if(wasNew){ state.daily.introduced++; }
  markCheckin(today);
  saveState();
}

// ---------- rendering ----------
var root = document.getElementById('app');
var currentTab = 'home';
var session = null; // {queue:[cards...], idx, flipped, stats:{forgot,fuzzy,good}}

function render(){
  if(!stateLoaded){
    root.innerHTML = '<div class="empty-state">加载中…</div>';
    return;
  }
  var html = '';
  html += renderHeader();
  html += renderDeckSwitch();
  html += renderTabs();
  html += '<div class="panel active">';
  if(currentTab==='home') html += renderHome();
  else if(currentTab==='review') html += renderReview();
  else if(currentTab==='browse') html += renderBrowse();
  else if(currentTab==='stats') html += renderStats();
  else if(currentTab==='settings') html += renderSettings();
  html += '</div>';
  html += '<div class="footer-note">根据艾宾浩斯记忆曲线安排复习 · 数据保存在本设备</div>';
  root.innerHTML = html;
  attachHandlers();
}

function renderHeader(){
  var deck = currentDeck();
  return '' +
  '<div class="header"><div class="header-row">' +
    '<div><h1>'+deck.label+' · 背诵</h1><div class="sub">根据记忆曲线安排复习计划 · 共 '+CARDS.length+' 个考点</div></div>' +
    '<div class="stamp">熟<br>记</div>' +
  '</div></div>';
}

function renderDeckSwitch(){
  return '<div class="deck-switch">' + DECKS.map(function(d){
    return '<div class="deck-pill'+(d.id===activeDeckId?' active':'')+'" data-deck="'+d.id+'">'+d.label+'<span class="n">'+d.cards.length+' 条</span></div>';
  }).join('') + '</div>';
}

function renderTabs(){
  var tabs = [['home','今日'],['review','背诵'],['browse','浏览'],['stats','统计'],['settings','设置']];
  return '<div class="tabs">' + tabs.map(function(t){
    return '<div class="tab'+(currentTab===t[0]?' active':'')+'" data-tab="'+t[0]+'">'+t[1]+'</div>';
  }).join('') + '</div>';
}

var WEEKDAY_LABELS = ['日','一','二','三','四','五','六'];
var MONTH_LABELS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
var streakViewMode = 'week'; // 'week' | 'year'

function renderStreak(){
  var streak = currentStreak();
  var total = totalCheckinDays();
  var streakLabel = streak > 0 ? ('连续打卡 ' + streak + ' 天') : '今天还没打卡';

  var html = '<div class="streak-card">';
  html += '<div class="streak-top">';
  html += '<div class="streak-flame">' + (streak > 0 ? '🔥' : buildCloverSVG()) + '</div>';
  html += '<div class="streak-text"><div class="streak-main">' + streakLabel + '</div>';
  html += '<div class="streak-sub">累计打卡 ' + total + ' 天</div></div>';
  html += '<div class="streak-toggle" data-action="toggle-streak-view">' + (streakViewMode === 'week' ? '查看未来一年 »' : '« 收起') + '</div>';
  html += '</div>';

  if(streakViewMode === 'week'){
    var days = last7Days();
    html += '<div class="streak-week">';
    days.forEach(function(d){
      var dt = new Date(d.date + 'T00:00:00');
      var lbl = WEEKDAY_LABELS[dt.getDay()];
      var cls = 'streak-dot' + (d.checked ? ' checked' : '') + (d.isToday ? ' today' : '');
      html += '<div class="streak-day"><div class="' + cls + '">' + (d.checked ? '✓' : '') + '</div><div class="streak-wd">' + lbl + '</div></div>';
    });
    html += '</div>';
  } else {
    html += renderYearHeatmap();
  }

  html += '</div>';
  return html;
}

function renderYearHeatmap(){
  var weeks = buildYearGrid();
  var cellStep = 14; // 11px cell + 3px gap
  var monthLabels = [];
  var lastMonth = null;
  weeks.forEach(function(week, wi){
    var d = new Date(week[0].date + 'T00:00:00');
    var m = d.getMonth();
    if(m !== lastMonth){
      monthLabels.push({week: wi, label: MONTH_LABELS[m]});
      lastMonth = m;
    }
  });

  var gridWidth = weeks.length * cellStep;
  var html = '<div class="heatmap-scroll"><div class="heatmap-inner" style="width:' + gridWidth + 'px;">';
  html += '<div class="heatmap-months">';
  monthLabels.forEach(function(ml){
    html += '<span style="left:' + (ml.week * cellStep) + 'px;">' + ml.label + '</span>';
  });
  html += '</div>';
  html += '<div class="heatmap-grid" style="grid-template-columns:repeat(' + weeks.length + ',11px);">';
  weeks.forEach(function(week){
    week.forEach(function(d){
      var cls = 'heatmap-cell' + (d.checked ? ' checked' : '') + (d.isToday ? ' today' : '') + (d.future ? ' future' : '');
      html += '<div class="' + cls + '" title="' + d.date + (d.checked ? ' 已打卡' : '') + '"></div>';
    });
  });
  html += '</div></div></div>';
  html += '<div class="heatmap-legend"><span>未来一年打卡日历</span><span>已打卡 ' + totalCheckinDays() + ' 天</span></div>';
  return html;
}

function renderHome(){
  var due = dueReviewCards().length;
  var fresh = Math.max(0, state.settings.newPerDay - state.daily.introduced);
  var freshAvail = Math.min(fresh, newAvailableCards().length);
  var mastered = masteredCount();
  var total = selectedTotal();
  var todayTotal = due + freshAvail;

  var html = '';
  html += renderStreak();
  html += '<div class="grid3">' +
    '<div class="stat-box due"><div class="num">'+due+'</div><div class="lbl">待复习</div></div>' +
    '<div class="stat-box new"><div class="num">'+freshAvail+'</div><div class="lbl">今日新卡</div></div>' +
    '<div class="stat-box mastered"><div class="num">'+mastered+'</div><div class="lbl">已掌握 / '+total+'</div></div>' +
  '</div>';

  if(todayTotal > 0){
    html += '<button class="btn block" data-action="start-review">开始背诵（共 '+todayTotal+' 张）</button>';
  } else {
    html += '<div class="empty-state"><div class="big">✓</div>今天的复习已完成，明天再来吧。<br>可以在「浏览」中随时查看所有考点。</div>';
  }

  html += '<div class="section-title">记忆曲线说明</div>';
  html += '<div class="card-block" style="font-size:13.5px; line-height:1.9; color:var(--ink-soft);">' +
    '新卡片首次记住后，将按 1、2、4、7、15、30、60、90 天的间隔安排复习——间隔逐渐拉长，符合艾宾浩斯遗忘曲线规律。' +
    '若某次答「忘记」，会重新从第 1 天开始；答「模糊」会缩短下一次复习的间隔。' +
    '每天新卡数量可在「设置」中调整。' +
  '</div>';
  return html;
}

function renderReview(){
  if(!session){
    var q = buildQueue();
    if(q.length===0){
      return '<div class="empty-state"><div class="big">✓</div>今天没有需要背诵的卡片了。<br>去「首页」查看进度，或在「设置」中增加每日新卡数量。</div>';
    }
    session = {queue:q, total:q.length, idx:0, flipped:false, stats:{forgot:0,fuzzy:0,good:0}};
  }
  if(session.idx >= session.queue.length){
    var s = session.stats;
    var doneMsg = '<div class="empty-state"><div class="big">🎉</div>本轮背诵完成！<br>' +
      '<span style="font-size:13px;">记得 '+s.good+' · 模糊 '+s.fuzzy+' · 忘记 '+s.forgot+'</span></div>' +
      '<button class="btn block outline" data-action="review-again">再来一轮</button>';
    return doneMsg;
  }
  var card = session.queue[session.idx];
  var pct = Math.round((session.idx / session.total) * 100);
  var boxLabel = isNew(card.id) ? '新卡' : ('第'+((cardProg(card.id).box)+1)+'阶段');

  var html = '';
  html += '<div class="review-wrap">';
  html += '<div class="progress-bar"><div class="fill" style="width:'+pct+'%"></div></div>';
  html += '<div class="flash" data-action="flip">';
  html += '<div class="tag">'+(card.chapter===card.section ? escapeHtml(card.chapter) : escapeHtml(card.chapter)+' › '+escapeHtml(card.section))+'</div>';
  html += '<div class="boxtag">'+boxLabel+'</div>';
  if(!session.flipped){
    html += '<div class="term">'+escapeHtml(card.term)+'</div>';
    html += '<div class="hint">点击卡片查看解释</div>';
  } else {
    html += '<div class="term">'+escapeHtml(card.term)+'</div>';
    html += '<div class="divider"></div>';
    html += '<div class="def">'+escapeHtml(card.def)+'</div>';
    if(deckHasExample && card.example){
      html += '<div class="example"><span class="exlbl">例</span>'+escapeHtml(card.example)+'</div>';
    }
    if(card.group) html += '<div class="hint">'+escapeHtml(card.group)+'</div>';
  }
  html += '</div>';
  if(session.flipped){
    html += '<div class="rate-row">' +
      '<div class="rate-btn forgot" data-action="rate" data-rating="forgot">忘记<span class="k">明天再练</span></div>' +
      '<div class="rate-btn fuzzy" data-action="rate" data-rating="fuzzy">模糊<span class="k">缩短间隔</span></div>' +
      '<div class="rate-btn good" data-action="rate" data-rating="good">记得<span class="k">拉长间隔</span></div>' +
    '</div>';
  }
  html += '</div>';
  return html;
}

function renderBrowse(){
  var q = (window.__browseQuery || '').trim();
  var html = '<input class="search-box" id="search-input" placeholder="搜索考点、关键词…" value="'+escapeHtml(q)+'">';
  html += '<div class="hint" style="text-align:left; margin:-8px 0 14px;">共 '+CARDS.length+' 条'+(q ? '' : '，全部展示')+'</div>';

  var filtered = CARDS;
  if(q){
    var lower = q.toLowerCase();
    filtered = CARDS.filter(function(c){
      return c.term.indexOf(q)>=0 || c.def.indexOf(q)>=0 || c.chapter.indexOf(q)>=0 || c.section.indexOf(q)>=0 || (c.group||'').indexOf(q)>=0;
    });
  }
  if(filtered.length===0){
    html += '<div class="empty-state">没有找到匹配的内容</div>';
    return html;
  }

  var groups = {};
  var order = [];
  filtered.forEach(function(c){
    var key = c.chapter===c.section ? c.chapter : (c.chapter+' · '+c.section);
    if(!groups[key]){ groups[key]=[]; order.push(key); }
    groups[key].push(c);
  });
  for(var gi=0; gi<order.length; gi++){
    var key = order[gi];
    html += '<div class="browse-group"><h3>'+escapeHtml(key)+'</h3>';
    groups[key].forEach(function(c){
      var mastered = isMastered(c.id) ? '★已掌握' : (isNew(c.id) ? '' : '学习中');
      html += '<div class="browse-item"><div class="t">'+escapeHtml(c.term)+'</div><div class="d">'+escapeHtml(c.def)+'</div><div class="m">'+mastered+'</div>';
      if(deckHasExample && c.example){
        html += '<div class="ex">例：'+escapeHtml(c.example)+'</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  }
  return html;
}

function renderStats(){
  var html = '';
  html += '<div class="section-title">总体进度</div>';
  var total = CARDS.length;
  var mastered = CARDS.filter(function(c){return isMastered(c.id);}).length;
  var learning = CARDS.filter(function(c){var p=cardProg(c.id); return p && p.box < MASTER_BOX;}).length;
  var neu = total - mastered - learning;
  html += statBar('已掌握', mastered, total, 'var(--gold)');
  html += statBar('学习中', learning, total, 'var(--seal)');
  html += statBar('未开始', neu, total, 'var(--ink-soft)');

  html += '<div class="section-title">分章节掌握情况</div>';
  CHAPTERS.forEach(function(ch){
    var chCards = CARDS.filter(function(c){return c.chapter===ch.chapter;});
    var m = chCards.filter(function(c){return isMastered(c.id);}).length;
    html += statBar(ch.chapter, m, chCards.length, 'var(--green)');
  });
  return html;
}

function statBar(label, val, total, color){
  var pct = total>0 ? Math.round(val/total*100) : 0;
  return '<div class="bar-row"><div class="lbl-row"><span>'+escapeHtml(label)+'</span><span>'+val+' / '+total+' ('+pct+'%)</span></div>' +
    '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%; background:'+color+';"></div></div></div>';
}

function renderSettings(){
  var html = '';
  html += '<div class="section-title">每日新卡数量</div>';
  html += '<div class="setting-row"><span>每天学习新卡片数</span><div class="stepper">' +
    '<button data-action="dec-new">−</button><span>'+state.settings.newPerDay+'</span><button data-action="inc-new">＋</button>' +
  '</div></div>';

  html += '<div class="section-title">章节范围</div>';
  html += '<div class="chapter-list">';
  CHAPTERS.forEach(function(ch){
    var checked = state.settings.chapters[ch.chapter] !== false;
    html += '<div class="chapter-row" data-action="toggle-chapter" data-chapter="'+escapeHtml(ch.chapter)+'">' +
      '<div class="cname"><div class="cbox'+(checked?' checked':'')+'">'+(checked?'✓':'')+'</div>'+escapeHtml(ch.chapter)+'</div>' +
      '<div class="cmeta">'+ch.count+' 条</div>' +
    '</div>';
  });
  html += '</div>';

  html += '<div class="section-title">云同步</div>';
  html += '<div class="card-block">';
  if(Sync.status === 'synced'){
    html += '<div class="setting-row"><span>同步状态</span><span style="color:var(--seal-dark);font-weight:700;">● 已连接</span></div>';
    html += '<div class="setting-row" style="border-bottom:none;"><span>同步码</span><span style="color:var(--ink-soft);">'+escapeHtml(Sync.code)+'</span></div>';
    html += '<div style="font-size:12px;color:var(--ink-soft);line-height:1.7;margin:8px 0 12px;">其他设备输入相同的同步码即可自动保持数据一致。</div>';
    html += '<button class="btn outline block" data-action="sync-disconnect">停止同步</button>';
  } else {
    html += '<div style="font-size:12.5px;color:var(--ink-soft);line-height:1.7;margin-bottom:10px;">在多台设备上输入同一个同步码，打卡和背诵进度会自动保持一致。同步码自己定，比如手机号或一串好记的字符。</div>';
    html += '<input type="text" id="sync-code-input" placeholder="设置一个同步码" value="'+escapeHtml(Sync.code)+'" style="width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:10px;box-sizing:border-box;background:var(--paper-card);color:var(--ink);">';
    html += '<button class="btn block" data-action="sync-connect"'+(Sync.status==='connecting'?' disabled':'')+'>'+(Sync.status==='connecting'?'连接中…':'开始同步')+'</button>';
    if(Sync.status === 'error') html += '<div style="color:var(--coral);font-size:12px;margin-top:8px;">连接失败，请检查网络后重试</div>';
  }
  html += '</div>';

  html += '<div class="section-title">数据</div>';
  html += '<button class="btn outline block" data-action="export-data">导出本题库进度（备份到文件）</button>';
  html += '<div style="height:8px"></div>';
  html += '<button class="btn outline block" data-action="import-data">从文件导入进度</button>';
  html += '<input type="file" id="import-file-input" accept="application/json" style="display:none">';
  html += '<div style="height:8px"></div>';
  html += '<button class="btn outline block" data-action="reset-progress">重置全部学习进度</button>';
  return html;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
  });
}

// ---------- event handling ----------
function attachHandlers(){
  root.querySelectorAll('.deck-pill').forEach(function(el){
    el.addEventListener('click', function(){
      var id = el.getAttribute('data-deck');
      if(id !== activeDeckId){
        currentTab = 'home';
        switchDeck(id);
      }
    });
  });

  root.querySelectorAll('.tab').forEach(function(el){
    el.addEventListener('click', function(){
      currentTab = el.getAttribute('data-tab');
      if(currentTab !== 'review'){ /* keep session alive in background */ }
      render();
    });
  });

  var toggleStreakView = root.querySelector('[data-action="toggle-streak-view"]');
  if(toggleStreakView) toggleStreakView.addEventListener('click', function(){
    streakViewMode = streakViewMode === 'week' ? 'year' : 'week';
    render();
  });

  var startBtn = root.querySelector('[data-action="start-review"]');
  if(startBtn) startBtn.addEventListener('click', function(){
    session = null;
    currentTab = 'review';
    render();
  });

  var reviewAgain = root.querySelector('[data-action="review-again"]');
  if(reviewAgain) reviewAgain.addEventListener('click', function(){
    session = null;
    render();
  });

  var flash = root.querySelector('[data-action="flip"]');
  if(flash) flash.addEventListener('click', function(){
    if(session && !session.flipped){
      session.flipped = true;
      render();
    }
  });

  root.querySelectorAll('[data-action="rate"]').forEach(function(el){
    el.addEventListener('click', function(e){
      e.stopPropagation();
      var rating = el.getAttribute('data-rating');
      var card = session.queue[session.idx];
      rateCard(card.id, rating);
      session.stats[rating]++;
      if(rating==='forgot'){
        session.queue.push(card); // requeue later this session
        session.total = Math.max(session.total, session.queue.length);
      }
      session.idx++;
      session.flipped = false;
      render();
    });
  });

  var searchInput = root.querySelector('#search-input');
  if(searchInput){
    searchInput.addEventListener('input', function(){
      window.__browseQuery = searchInput.value;
      var scrollPos = window.scrollY;
      render();
      var again = root.querySelector('#search-input');
      if(again){ again.focus(); var v = again.value; again.value=''; again.value=v; }
      window.scrollTo(0, scrollPos);
    });
  }

  var decNew = root.querySelector('[data-action="dec-new"]');
  if(decNew) decNew.addEventListener('click', function(){
    state.settings.newPerDay = Math.max(5, state.settings.newPerDay-5);
    saveState(); render();
  });
  var incNew = root.querySelector('[data-action="inc-new"]');
  if(incNew) incNew.addEventListener('click', function(){
    state.settings.newPerDay = Math.min(200, state.settings.newPerDay+5);
    saveState(); render();
  });

  root.querySelectorAll('[data-action="toggle-chapter"]').forEach(function(el){
    el.addEventListener('click', function(){
      var ch = el.getAttribute('data-chapter');
      state.settings.chapters[ch] = state.settings.chapters[ch] === false ? true : false;
      saveState(); render();
    });
  });

  var syncConnectBtn = root.querySelector('[data-action="sync-connect"]');
  if(syncConnectBtn) syncConnectBtn.addEventListener('click', function(){
    var input = root.querySelector('#sync-code-input');
    var code = input ? input.value : '';
    if(!code || !code.trim()){ alert('请先输入一个同步码'); return; }
    Sync.connect(code, true);
  });

  var syncDisconnectBtn = root.querySelector('[data-action="sync-disconnect"]');
  if(syncDisconnectBtn) syncDisconnectBtn.addEventListener('click', function(){
    if(confirm('停止同步后，这台设备不会再自动更新云端数据，确定吗？')){
      Sync.disconnect();
    }
  });

  var resetBtn = root.querySelector('[data-action="reset-progress"]');
  if(resetBtn) resetBtn.addEventListener('click', function(){
    if(confirm('确定要清空全部学习进度吗？此操作无法撤销。')){
      state.progress = {};
      state.daily = {date: todayStr(), introduced:0};
      session = null;
      saveState();
      render();
    }
  });

  var exportBtn = root.querySelector('[data-action="export-data"]');
  if(exportBtn) exportBtn.addEventListener('click', function(){
    var payload = {deck: activeDeckId, exportedAt: new Date().toISOString(), state: state};
    var blob = new Blob([JSON.stringify(payload, null, 1)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'srs-backup-' + activeDeckId + '-' + todayStr() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  var importBtn = root.querySelector('[data-action="import-data"]');
  var importInput = root.querySelector('#import-file-input');
  if(importBtn && importInput){
    importBtn.addEventListener('click', function(){ importInput.click(); });
    importInput.addEventListener('change', function(){
      var file = importInput.files[0];
      if(!file) return;
      var reader = new FileReader();
      reader.onload = function(e){
        try{
          var payload = JSON.parse(e.target.result);
          var incoming = payload.state || payload;
          if(!incoming.progress) throw new Error('invalid file');
          if(confirm('导入将覆盖当前"' + currentDeck().label + '"题库的学习进度，确定继续吗？')){
            state = incoming;
            if(state.daily.date !== todayStr()) state.daily = {date: todayStr(), introduced:0};
            saveState();
            session = null;
            render();
          }
        } catch(err){
          alert('导入失败：文件格式不正确');
        }
      };
      reader.readAsText(file);
    });
  }
}

// ---------- init ----------
(async function init(){
  try{
    var res = await LocalStore.get('srs_active_deck');
    if(res && res.value && DECKS.some(function(d){return d.id===res.value;})){
      activeDeckId = res.value;
    }
  } catch(e){}
  var deck = currentDeck();
  CARDS = deck.cards;
  deckHasExample = deck.hasExample;
  CHAPTERS = buildIndex(CARDS);
  render();
  await Promise.all([loadState(), loadCheckins()]);
  render();
  await Sync.init();
  render();
})();

</script>
</body>
</html>
